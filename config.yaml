endpoint: http://localhost:8000/v1
model: vlm
camera_topic: /sensing/front/rgb/image_raw/compressed
# GUI input for the LIVE monitor (live_gui.py): an MP4 file path OR an rtsp:// URL.
# Examples: data/full_cycle.mp4  |  rtsp://root:root@10.20.30.40:554/cam0_0
input: rtsp://root:root@10.20.30.40:554/cam0_0
sampling_sec: 5.0
window_frames: 1
frame_max_width: 1200
face_crop:
- 0.22
- 0.2
- 0.78
- 0.92
max_tokens: 420
temperature: 0.0
votes: 1
vote_temperature: 0.6
support_window: 3
hazard_confirm: 2
# fraction of danger-zone pixels that must change for the boom to count as MOVING
# (an operator entering while the boom moves => non-compliant). Raise to be less
# sensitive. Data clusters: <=0.023 stopped, >=0.046 moving; 0.035 sits in the gap.
boom_motion_thresh: 0.035
paths:
  regulation: regulation.yaml
  video: data/demo.mp4
  frame_index: data/frames.idx
  analysis: data/analysis.json
