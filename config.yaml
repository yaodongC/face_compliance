endpoint: http://localhost:8000/v1
model: vlm
camera_topic: /sensing/front/rgb/image_raw/compressed
# GUI input for the LIVE monitor (live_gui.py): an MP4 file path OR an rtsp:// URL.
# Credentials are NOT stored here — they come from env vars expanded at runtime:
#   export RTSP_USER=<user> RTSP_PASS=<pass>
# Examples: data/full_cycle.mp4  |  rtsp://${RTSP_USER}:${RTSP_PASS}@10.20.30.40:554/cam0_0
input: rtsp://${RTSP_USER}:${RTSP_PASS}@10.20.30.40:554/cam0_0
sampling_sec: 5.0
window_frames: 1
frame_max_width: 1200
face_crop:
- 0.22
- 0.2
- 0.78
- 0.92
max_tokens: 420
temperature: 0.0
votes: 1
vote_temperature: 0.6
support_window: 3
hazard_confirm: 2

# --- harness parameters (single source of truth; see harness_config.DEFAULTS) ---
# Thresholds/ROIs the rule layer uses. boom_motion_thresh data clusters: <=0.023
# stopped, >=0.046 moving; 0.035 sits in the gap (raise to be less sensitive).
params:
  operator:
    danger_roi: [0.45, 1.0, 0.20, 0.80]
    motion_px_thresh: 25
    boom_motion_thresh: 0.035
    min_orange: 0.015
    orange_hsv_lo: [3, 110, 110]
    orange_hsv_hi: [20, 255, 255]
    bbox: {min_area: 0.004, max_area: 0.25, max_aspect: 1.6}
    session_gap: 20.0
    face_band: [0.15, 0.10, 0.90, 0.85]
    screen_send_w: 1000
    person_send_w: 1000
    person_max_tokens: 140
    screen_max_tokens: 120
  coverage:
    face_x: [0.20, 0.85]
    mesh_gap: 240
    mesh_min_events: 3
    width_panel_w: 0.12
    width_min_hits: 2
    width_bin_w: 0.02
    min_overlap: 0.02
    full_coverage_frac: 0.98
    segments: 4

paths:
  regulation: regulation.yaml
  video: data/demo.mp4
  frame_index: data/frames.idx
  analysis: data/analysis.json
