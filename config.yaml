# vLLM OpenAI-compatible endpoint serving nvidia/Cosmos-Reason2-2B
endpoint: "http://localhost:8000/v1"
model: "cosmos-reason"

# Front RGB camera topic in the ROS1 bags
camera_topic: "/sensing/front/rgb/image_raw/compressed"

# Analysis sampling
sampling_sec: 5.0       # run the VLM every N seconds of footage
window_frames: 6        # frames per analysis window (temporal context)
frame_max_width: 640    # downscale frames before sending to the VLM

# Generation
max_tokens: 1024
temperature: 0.2

# Compliance debounce / clearing (tuned for noisy real-model output)
confirm_satisfied: 1     # satisfied windows before a process item locks
confirm_violation: 2     # consecutive violation windows before locking a violation
confirm_clear: 2         # compliant windows before a locked violation clears
min_severity: "med"      # min safety-flag severity that counts: low|med|high

paths:
  regulation: "regulation.yaml"
  video: "data/front_camera.mp4"
  frame_index: "data/frames.idx"
  analysis: "data/analysis.json"
