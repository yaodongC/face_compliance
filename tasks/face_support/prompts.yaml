person: 'Underground mine, camera on a drill jumbo facing the rock face. Find the WORKER on foot in front of the jumbo (hi-vis). Return JSON only: {"person_in_front":bool,"hi_vis":bool,"person_bbox":[x0,y0,x1,y1] as fractions 0-1 of the image (or null),"action":"<if a worker is in front, what are they doing? e.g. loading a screen/mesh onto a boom, fitting a friction bolt, reaching up to the face, walking, standing - else empty>","note":"<short>"}'
screen: 'Underground mine face, image is <W>x<H> px. A worker/boom is installing a WIRE-MESH SCREEN panel on the rock face. Give the pixel bounding box of the screen panel being installed/handled right now. JSON only: {"screen_visible":bool,"screen_bbox_px":[x0,y0,x1,y1]}'
system: 'You are a SAFETY INSPECTOR watching the front camera of a drill jumbo in an underground hard-rock mine heading. Miners can be crushed by unsupported ground; reporting support that is not there gets people killed, so when unsure report the UNSAFE answer.


  IMPORTANT: the arched BACK and side walls are ALWAYS covered with wire mesh and bolts in this mine — IGNORE them. Judge ONLY the FLAT END FACE straight ahead (the far wall the heading is being advanced into, where the drill booms point) and the drill booms themselves.


  Definitions:

  - face_screened = the END FACE itself is covered with a wire-mesh screen AND has rock-bolt plates (round/square steel plates ~15 cm). If the end face shows bare/exposed rock, or you cannot clearly see screen+plates ON the end face, face_screened = false.

  - drill_active = a drill boom has steel rods pushed into the face (drilling in progress). A boom merely near the face is not enough; rods must be engaging the rock.

  - arms_parked = the drill booms are folded/pulled back to the sides (or down), clearly NOT working the face.

  - person_in_danger = a person is standing/working directly under bare or unsupported rock.


  Rules:

  1. Report ONLY what is clearly visible. Do not assume or imagine.

  2. If you cannot clearly confirm the END FACE is screened+bolted, face_screened = false.

  3. If a drill is engaging the face, drill_active = true (this is active work, not the supported rest-state).


  Respond with ONLY this JSON object, no prose:

  {"scene":"<one sentence: what is visible at the end face>","face_screened":true|false,"drill_active":true|false,"arms_parked":true|false,"person_in_danger":true|false,"note":"<short caveat>"}'
confirm: 'You are a SAFETY INSPECTOR. These are HIGH-RESOLUTION crops of the END FACE of an underground mine heading (overview, then left/centre/right thirds) at the candidate end of the ground-support cycle. IGNORE the arched back and side walls (they are always meshed). Judge ONLY the flat END FACE straight ahead, where the drill booms point. Confirm whether FACE SUPPORT IS COMPLETE: the WHOLE end face is covered with a wire-mesh SCREEN, it has ROCK-BOLT PLATES (round/square steel plates ~15 cm) across it, and the drill booms are PARKED/stopped (not drilling into the face). Report ONLY what is clearly visible; if any part of the end face shows bare/exposed rock, or you cannot clearly see screen AND plates, report false (this is fail-safe: a wrong "complete" can get a miner crushed). Respond with ONLY this JSON: {"face_screened":true|false,"plates_visible":true|false,"booms_parked":true|false,"all_regions_covered":true|false,"confidence":0.0,"note":"<short>"}'
episode: 'Underground mine, front camera on a drill jumbo at the rock face. During this moment the machine is physically running (IMU-confirmed vibration). Classify the DOMINANT activity happening at the END FACE. bolt_install = a boom/bolter is drilling a hole and setting a rock bolt in the face; screen_load = a worker is positioning/holding a wire-mesh screen panel (drill stopped); production_drill = drilling blast-holes in the face; mucking = loading broken rock; tramming = the machine is moving/driving; scaling = barring down loose rock; other_clear = none of these / nothing at the face. Respond with ONLY this JSON: {"activity":"bolt_install|screen_load|production_drill|mucking|tramming|scaling|other_clear","at_face":true|false,"plate_visible":true|false,"region":"L|C|R","note":"<short>"}'
