# Task params for face_support (merged over harness_config.DEFAULTS, validated at load)
operator:
  danger_roi: [0.45, 1.0, 0.20, 0.80]
  motion_px_thresh: 25
  boom_motion_thresh: 0.035
  min_orange: 0.06          # hi-vis vest gate: boom hallucinations ~0.02-0.04, real vests 0.09-0.27
  orange_hsv_lo: [3, 110, 110]
  orange_hsv_hi: [20, 255, 255]
  bbox: {min_area: 0.004, max_area: 0.25, max_aspect: 1.6}
  session_gap: 20.0
  face_band: [0.15, 0.10, 0.90, 0.85]
  screen_send_w: 1000
  person_send_w: 1000
  person_max_tokens: 140
  screen_max_tokens: 120
  # IMU machine-motion fusion (replaces the confounded vision frame-diff for "boom moving").
  # Front Livox IMU: machine idle ~0.005 accel-std, drilling/booming ~0.03+. Physical signal,
  # immune to the operator walking / dust / lighting that produced the vision false positives.
  imu_topic: /sensing/front/livox/imu
  imu_active_thr: 0.013
  imu_win_sec: 3.0
  person_persist_n: 6        # frames sampled around a detection to confirm a real operator
  person_persist_thr: 0.6    # fraction that must confirm person_in_front to count as PRESENT
coverage:
  face_x: [0.20, 0.85]
  mesh_gap: 240
  mesh_min_events: 3
  width_panel_w: 0.12
  width_min_hits: 2
  width_bin_w: 0.02
  min_overlap: 0.02
  full_coverage_frac: 0.98
  segments: 4
  # --- SIZE-DEPENDENT support requirement (the # of meshes/bolts depends on FACE SIZE,
  #     not a fixed 4/16). face_width is MEASURED from the front Lidar (accumulated scans).
  #     The mesh/bolt RULE (sheet width, overlap, 4'x5' pattern) is the single source of
  #     truth in vale_support.py, distilled from the Vale documents — NOT configured here.
  bolts_per_screen: 4        # leading-edge minimum bolts/screen (cross-check; vale_support authoritative)
  bolt_min_dur: 40           # IMU sustained-drilling seconds for one bolt hole
  bolt_min_peak: 0.05        # IMU accel-std peak for a real drilling episode
  face_width_default: 6.0    # fallback face width (m) if the Lidar measurement is absent
