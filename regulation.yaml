# Perception-grounded, fail-safe checklist. Every item defaults to NOT_VERIFIED
# (we never assume safety). An item turns VERIFIED only on sustained, conjunctive
# visual evidence; the safety items turn VIOLATION on an observed hazard.
# Order = display order in the GUI.
items:
  - id: bolts
    label: "Rock bolts installed (steel plates in a pattern)"
  - id: mesh
    label: "Wire mesh / screen on the face"
  - id: support
    label: "Face fully supported (mesh + bolts) before drilling"
  - id: drill_safe
    label: "No drilling on an unsupported face"
  - id: worker_safe
    label: "No worker under unsupported ground"
