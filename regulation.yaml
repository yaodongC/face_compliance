# Face-focused, fail-safe checklist. Every item defaults to NOT_VERIFIED. The
# compliant SUPPORTED state requires the face screened, the booms parked, and no
# active drilling, sustained over the window. Order = display order in the GUI.
items:
  - id: face_screen
    label: "End face screened + bolted (mesh + plates on the face)"
  - id: no_active_drilling
    label: "No active drilling at the face"
  - id: arms_parked
    label: "Drill booms parked clear of the face"
  - id: worker_safe
    label: "No worker under unsupported ground"
